name: Deploy frontend to Cloudflare Pages

# Auto-deploys the RescueGrid dashboard to Cloudflare Pages on every push to main.
# CI bakes VITE_WORKER_URL (the deployed Worker) into the build — the local
# .env.local is gitignored and absent here, so the URL below is the single
# source of truth for production. Requires two repo secrets:
#   CLOUDFLARE_API_TOKEN  (token with "Cloudflare Pages: Edit" + "Account: Read")
#   CLOUDFLARE_ACCOUNT_ID
on:
  push:
    branches: [main]
    paths-ignore:
      - 'worker/**'
      - '**.md'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: cf-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build (demo + live Worker reads)
        run: npm run build
        env:
          VITE_WORKER_URL: https://rescuegrid-worker.davirain-yin.workers.dev
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=rescuegrid --branch=main
