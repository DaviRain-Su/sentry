name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  worker:
    name: Worker Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: Install root deps (shared core/ imports @noble/hashes)
        working-directory: .
        run: npm ci

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  move:
    name: Move Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Sui CLI (latest testnet release)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/MystenLabs/sui/releases?per_page=40" \
            | jq -r '[.[] | select(.tag_name|test("testnet"))][0].tag_name')
          echo "Installing Sui $TAG"
          curl -fL "https://github.com/MystenLabs/sui/releases/download/${TAG}/sui-${TAG}-ubuntu-x86_64.tgz" -o /tmp/sui.tgz
          mkdir -p "$HOME/.sui-bin"
          tar -xzf /tmp/sui.tgz -C "$HOME/.sui-bin"
          echo "$HOME/.sui-bin" >> "$GITHUB_PATH"
          "$HOME/.sui-bin/sui" --version

      - name: Test MoveGate
        working-directory: move/movegate
        run: sui move test

      - name: Test RescueGrid
        working-directory: move/rescuegrid
        run: sui move test
